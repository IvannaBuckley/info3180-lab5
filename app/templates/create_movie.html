<!DOCTYPE html>
<html>
<head>
    <title>Create Movie</title>
</head>
<body>

<h1>Add Movie</h1>

<form method="POST" enctype="multipart/form-data">
    {{ form.hidden_tag() }}

    <div>
        {{ form.title.label }}
        {{ form.title() }}
    </div>

    <div>
        {{ form.description.label }}
        {{ form.description() }}
    </div>

    <div>
        {{ form.poster.label }}
        {{ form.poster() }}
    </div>

    <div>
        {{ form.submit() }}
    </div>
</form>

</body>
</html>
